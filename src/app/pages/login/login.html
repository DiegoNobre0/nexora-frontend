<div class="login-page-wrapper">
  <div class="brand-section">
    <div class="brand-content">
      <h1 class="welcome-title">Seja bem-vindo ao <span class="highlight">NEXORA</span></h1>
      <p class="welcome-text">NEXORA unifica agendamento, financeiro e IA para salões modernos e eficientes.</p>
      <button class="btn-learn-more">Saiba Mais</button>
    </div>
    <div class="abstract-graphic"></div>
  </div>

  <div class="form-section">
    <div class="login-card">
      <header class="card-header">
        <div class="brand-badge">
          <lucide-icon name="circle" class="circle-bg"></lucide-icon>
          <span class="n-logo">N</span>
        </div>
        <h2>Sign In</h2>
        <p>Seu Painel de Administração</p>
      </header>

      <div class="social-login">
        <button class="btn-social google">

          Google
        </button>
        <button class="btn-social facebook">
          <img src="https://authjs.dev/img/providers/facebook.svg" alt="Facebook" width="18">
          Facebook
        </button>
      </div>

      <div class="separator">
        <span class="text">ou entre com</span>

      <div class="mock-credentials">
        <p>admin@nexora.com || admin123</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" formControlName="email" placeholder="seu@email.com" class="nexora-input">
        </div>

        <div class="form-group">
          <div class="label-wrapper">
            <label>Senha</label>
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
          </div>
          <input type="password" formControlName="password" placeholder="••••••••" class="nexora-input">
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox"> Lembrar deste Dispositivo
          </label>
        </div>

        <button type="submit" class="btn-login" [disabled]="loginForm.invalid">Sign In</button>
      </form>

      <footer class="card-footer">
        <p>Novo no Nexora? <a href="#" class="highlight-link">Criar conta</a></p>
      </footer>
    </div>
  </div>
</div>
