<div class="login-page-wrapper">

  <div class="brand-section">
    <img src="logo.png" class="giant-bg-logo" alt="Nexora Marca d'água">

    <div class="brand-content">
      <h1 class="welcome-title">Seja bem-vindo ao <span class="highlight">NEXORA</span></h1>
      <p class="welcome-text">NEXORA unifica agendamento, financeiro e IA para salões e clínicas modernas e eficientes.
      </p>
      <button class="btn-learn-more">Saiba Mais</button>
    </div>
    <div class="abstract-graphic"></div>
  </div>

  <div class="form-section">
    <div class="login-card">

      <header class="card-header">
        <img src="logo.png" class="logo" alt="Logo Nexora">

        <!-- <h2>Login</h2>
        <p>Seu Painel de Administração</p> -->
      </header>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" formControlName="email" placeholder="diego@nexora.com" class="nexora-input">
        </div>

        <div class="form-group">
          <div class="label-wrapper">
            <label>Senha</label>
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
          </div>
          <input type="password" formControlName="password" placeholder="••••••••" class="nexora-input">
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox"> Lembrar deste Dispositivo
          </label>
        </div>

        <button type="submit" class="btn-login" [disabled]="loginForm.invalid">Entrar</button>
      </form>

      <footer class="card-footer">
        <p>Novo no Nexora? <a routerLink="/signup" class="highlight-link">Criar conta</a></p>
      </footer>
    </div>
  </div>
</div>
